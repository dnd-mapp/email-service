name: Push tag
on:
    push:
        tags:
            - 'v*'
permissions:
    contents: read
jobs:
    publish:
        name: Publish
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: CI
              uses: ./.github/actions/ci

            - name: Create tags
              id: tags
              shell: bash
              run: node .github/scripts/generate-tags.mjs

            - name: Create Docker image
              uses: dnd-mapp/.github/.github/actions/docker-build@c78632d4e2a58932d57a301542d1ecd5ae9c8258
              with:
                  docker-username: ${{ secrets.DOCKER_USERNAME }}
                  docker-password: ${{ secrets.DOCKER_PASSWORD }}
                  tags: ${{ steps.tags.outputs.tags }}
                  scope: 'dndmapp/email-service@push'
