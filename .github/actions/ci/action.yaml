name: Continuous Integration
description: Runs continuous integration checks
runs:
    using: composite
    steps:
        - name: Set up tools
          uses: dnd-mapp/.github/.github/actions/setup-tools@c3d8e5374660511ad91a0fe705cae3ba4643d674

        - name: Generate Prisma client
          shell: bash
          run: pnpm gen:prisma

        - name: Check formatting
          shell: bash
          run: pnpm format:check

        - name: Check linting
          shell: bash
          run: pnpm lint

        - name: Compile app
          shell: bash
          run: pnpm build

        - name: Run unit tests
          shell: bash
          run: pnpm test
